<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Frontend Mentor | Product preview card component</title>

</head>

<body class="min-h-screen flex justify-center items-center bg bg-orange-200">
  <div class="container bg-white flex flex-row"
    style="width: 600px; height: 400px; border-radius: 20px; overflow: hidden;">
    <div class="left-i">
      <img src="/images/image-product-desktop.jpg" style="width: 300px; height: 400px;">
    </div>
    <div class="right-t ml-10" style="width: 50%;">

      <h2 class="pt-5">Perfume</h2>

      <h1 class=" text-2xl mt-5 font-bold ">Gabrielle Essence Eau De Parfum</h1>

      <p class="mt-5">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>

      <h2 class="mt-5 text-3xl text-green-600">$149.99</h2>
      <h4 class="h">$169.99</h4>
      <button class="p-5 pl-10 pr-10 bg-green-600 text-white"
        style="border-radius: 10px; font-size:20px 10px; width: 250px">Add to Card
      </button>
    </div>
  </div>
  </div>
</body>

</html>
